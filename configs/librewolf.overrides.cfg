// Preserve cookies and login sessions across restarts.
// Librewolf defaults to clearing all 1P state on shutdown — these prefs
// disable that behaviour while keeping everything else (fingerprint resistance,
// uBlock, strict tracking protection) intact.
//
// pref() is used instead of defaultPref() so these values override the
// main librewolf.cfg defaults regardless of load order.
pref("privacy.sanitize.sanitizeOnShutdown", false);
pref("privacy.clearOnShutdown_v2.cookiesAndStorage", false);
pref("network.cookie.lifetimePolicy", 0);
