# Read by /usr/bin/brave (brave-bin) at every launch.
# One flag per line, blank lines and `#` comments ignored.

# Disable the four mechanisms Brave/Chromium uses to wipe 1P state in the
# background, which collectively keep logging us out of Google:
#
#   DIPS                              Chromium bounce-tracking mitigation;
#                                     periodically clears cookies+storage
#                                     for sites flagged as bounce trackers.
#                                     accounts.google.com is a frequent hit
#                                     because Google auth bounces through it.
#   BraveForgetFirstPartyStorage      Brave's parallel feature: wipes 1P
#                                     storage for sites not visited recently.
#                                     Catches accounts.google.com because we
#                                     visit mail.google.com directly, not
#                                     accounts.google.com.
#   BraveForgetFirstPartyStorageByDefault
#                                     Makes the above apply globally instead
#                                     of opt-in per site.
#   BraveCleanupSessionCookiesOnSessionRestore
#                                     Wipes session cookies whenever Brave
#                                     does a session-restore at startup
#                                     (which it does on every dirty exit /
#                                     exit_type=Crashed).
--disable-features=DIPS,BraveForgetFirstPartyStorage,BraveForgetFirstPartyStorageByDefault,BraveCleanupSessionCookiesOnSessionRestore
