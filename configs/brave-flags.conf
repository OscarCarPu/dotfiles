# Read by /usr/bin/brave (brave-bin) at every launch.
# One flag per line, blank lines and `#` comments ignored.

# Disable DIPS (Bounce Tracking Mitigations). DIPS periodically wipes
# cookies+storage for sites it flags as bounce trackers, which silently
# logs us out of services that route auth through bounce-style redirects
# (Gmail, Claude, etc.).
--disable-features=DIPS
