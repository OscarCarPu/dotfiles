wireplumber.profiles = {
  # Don't restore the saved default sink/source across sessions or hot-plug.
  # Otherwise find-selected-default-node.lua bumps the previously-configured
  # node by +30000, which beats the priority.session = 3000 we set for the BT
  # speaker - so the Vtin R2 wouldn't auto-switch on reconnect. With state
  # disabled, find-best wins and priority rules in 51-default-sink.conf apply.
  main = {
    hooks.default-nodes.state = disabled
  }
}
