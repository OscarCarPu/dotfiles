monitor.bluez.rules = [
  # Bluetooth (Vtin R2 etc.) wins whenever connected
  {
    matches = [
      {
        node.name = "~bluez_output.*"
      }
    ]
    actions = {
      update-props = {
        priority.driver = 3000
        priority.session = 3000
      }
    }
  }
]

monitor.alsa.rules = [
  # DisplayLink dock: second priority
  {
    matches = [
      {
        node.name = "~alsa_output.usb-DisplayLink_USB3.1_Universal_Docking_Station*"
      }
    ]
    actions = {
      update-props = {
        priority.driver = 2000
        priority.session = 2000
        # Headroom for USB bus disruptions (e.g. Switch dock)
        api.alsa.headroom = 1024
      }
    }
  }
  # Built-in audio: fallback
  {
    matches = [
      {
        node.name = "~alsa_output.pci-*"
      }
    ]
    actions = {
      update-props = {
        priority.driver = 500
        priority.session = 500
      }
    }
  }
]
