wireplumber.settings = {
  # Streams follow the default sink when it changes (default behavior, made
  # explicit). Combined with the priority rules in 51-default-sink.conf this
  # means Spotify auto-yanks onto the BT speaker / dock when they connect.
  linking.follow-default-target = true
  # Don't pause media players when their target sink is removed - PipeWire
  # will reroute them to the next-best sink and we want playback to continue.
  linking.pause-playback = false
}
